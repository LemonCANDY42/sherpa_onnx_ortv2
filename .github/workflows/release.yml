name: release

on:
  workflow_dispatch:
    inputs:
      sherpa_tag:
        description: "Upstream sherpa_onnx version"
        required: true
        default: "1.12.27"
      ort_version:
        description: "Target ONNX Runtime line"
        required: true
        default: "1.23.2"
      publish:
        description: "Set true to publish to pub.dev"
        required: true
        default: "false"

env:
  FLUTTER_VERSION: "3.38.6"

jobs:
  dry_run:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - name: Prime upstream pub cache
        run: dart pub cache add sherpa_onnx --version "${{ github.event.inputs.sherpa_tag }}"

      - name: Validate compat matrix
        working-directory: packages/sherpa_onnx_ortv2
        run: >
          ./tools/assert-compat-matrix.ps1
          -SherpaTag "${{ github.event.inputs.sherpa_tag }}"
          -OrtVersion "${{ github.event.inputs.ort_version }}"

      - name: API compatibility guard
        working-directory: packages/sherpa_onnx_ortv2
        run: >
          ./tools/check-public-api-exports.ps1
          -UpstreamVersion "${{ github.event.inputs.sherpa_tag }}"

      - name: Publish dry-run (android)
        working-directory: packages/sherpa_onnx_ortv2_android
        run: |
          flutter pub get
          dart pub publish --dry-run

      - name: Publish dry-run (ios)
        working-directory: packages/sherpa_onnx_ortv2_ios
        run: |
          flutter pub get
          dart pub publish --dry-run

      - name: Publish dry-run (main)
        working-directory: packages/sherpa_onnx_ortv2
        run: |
          flutter pub get
          dart pub publish --dry-run

  publish:
    if: ${{ github.event.inputs.publish == 'true' }}
    runs-on: ubuntu-latest
    needs: dry_run
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - name: Configure pub.dev token
        run: dart pub token add https://pub.dev --env-var PUB_DEV_TOKEN
        env:
          PUB_DEV_TOKEN: ${{ secrets.PUB_DEV_TOKEN }}

      - name: Publish android package
        working-directory: packages/sherpa_onnx_ortv2_android
        run: |
          flutter pub get
          dart pub publish --force

      - name: Publish ios package
        working-directory: packages/sherpa_onnx_ortv2_ios
        run: |
          flutter pub get
          dart pub publish --force

      - name: Publish main package
        working-directory: packages/sherpa_onnx_ortv2
        run: |
          flutter pub get
          dart pub publish --force
