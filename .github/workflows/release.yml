name: release-check

on:
  workflow_dispatch:
    inputs:
      sherpa_tag:
        description: "Upstream sherpa_onnx version"
        required: true
        default: "1.12.27"
      ort_version:
        description: "Target ONNX Runtime line"
        required: true
        default: "1.23.2"
      release_label:
        description: "Label for build artifact"
        required: false
        default: "manual"

env:
  FLUTTER_VERSION: "3.38.6"

jobs:
  release_check:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - name: Prime upstream pub cache
        run: dart pub cache add sherpa_onnx --version "${{ github.event.inputs.sherpa_tag }}"

      - name: Validate compat matrix
        working-directory: packages/sherpa_onnx_ortv2
        run: >
          ./tool/assert-compat-matrix.ps1
          -SherpaTag "${{ github.event.inputs.sherpa_tag }}"
          -OrtVersion "${{ github.event.inputs.ort_version }}"

      - name: API compatibility guard
        working-directory: packages/sherpa_onnx_ortv2
        run: >
          ./tool/check-public-api-exports.ps1
          -UpstreamVersion "${{ github.event.inputs.sherpa_tag }}"

      - name: Android symbol version guard
        working-directory: packages/sherpa_onnx_ortv2
        run: >
          ./tool/check-android-sherpa-symbol-version.ps1
          -ExpectedOrtVersion "${{ github.event.inputs.ort_version }}"

      - name: Publish dry-run (android)
        working-directory: packages/sherpa_onnx_ortv2_android
        run: |
          flutter pub get
          dart pub publish --dry-run

      - name: Publish dry-run (ios)
        working-directory: packages/sherpa_onnx_ortv2_ios
        run: |
          flutter pub get
          dart pub publish --dry-run

      - name: Publish dry-run (main)
        working-directory: packages/sherpa_onnx_ortv2
        run: |
          flutter pub get
          dart pub publish --dry-run

      - name: Package source snapshot
        run: |
          New-Item -ItemType Directory -Force -Path artifacts | Out-Null
          tar -czf artifacts/sherpa_onnx_ortv2-${{ github.event.inputs.release_label }}-${{ github.sha }}.tar.gz packages .github/workflows

      - name: Upload source artifact
        uses: actions/upload-artifact@v4
        with:
          name: sherpa_onnx_ortv2-source-${{ github.sha }}
          path: artifacts/*.tar.gz
