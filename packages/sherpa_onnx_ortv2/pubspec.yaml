name: sherpa_onnx_ortv2

description: >
  Speech recognition, speech synthesis, speaker diarization, and speaker recognition
  using next-gen Kaldi with onnxruntime without Internet connection.

repository: https://github.com/LemonCANDY42/sherpa_onnx_ortv2

issue_tracker: https://github.com/LemonCANDY42/sherpa_onnx_ortv2/issues
documentation: https://k2-fsa.github.io/sherpa/onnx/

topics:
  - speech-recognition
  - speech-synthesis
  - speaker-diarization
  - audio-tagging
  - voice-activity-detection

# remember to change the version in ../sherpa_onnx_macos/macos/sherpa_onnx_macos.podspec
version: 1.12.27-ortv2.0

homepage: https://github.com/LemonCANDY42/sherpa_onnx_ortv2

environment:
  sdk: ">=3.1.0 <4.0.0"
  flutter: ">=2.8.1"

dependencies:
  ffi: ^2.1.0
  flutter:
    sdk: flutter
  onnxruntime_v2: ^1.23.2+2

  sherpa_onnx_ortv2_android: ^1.12.27-ortv2.0

  sherpa_onnx_macos: ^1.12.27
  # sherpa_onnx_macos:
  #   path: ../sherpa_onnx_macos

  sherpa_onnx_linux: ^1.12.27
  # sherpa_onnx_linux:
  #   path: ../sherpa_onnx_linux

  sherpa_onnx_windows: ^1.12.27
  # sherpa_onnx_windows:
  #   path: ../sherpa_onnx_windows

  sherpa_onnx_ortv2_ios: ^1.12.27-ortv2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  plugin:
    platforms:
      android:
        default_package: sherpa_onnx_ortv2_android

      ios:
        default_package: sherpa_onnx_ortv2_ios

      macos:
        default_package: sherpa_onnx_macos

      linux:
        default_package: sherpa_onnx_linux

      windows:
        default_package: sherpa_onnx_windows

